<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>URL Shortener</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 400px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .result {
      margin-top: 15px;
      word-break: break-all;
    }

    a {
      color: #22c55e;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>URL Shortener</h2>

  <input type="text" id="urlInput" placeholder="Enter URL here..." />
  <button onclick="shortenUrl()">Shorten</button>

  <div class="result" id="result"></div>
</div>

<script>
  async function shortenUrl() {
    const url = document.getElementById("urlInput").value;

    const res = await fetch("/api/shorten", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ originalUrl: url })
    });

    const data = await res.json();

    if (data.shortUrl) {
      document.getElementById("result").innerHTML =
        `Short URL: <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>`;
    } else {
      document.getElementById("result").innerText = "Error generating short URL";
    }
  }
</script>

</body>
</html>
