apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
  namespace: url-shortener

spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener

  template:
    metadata:
      labels:
        app: url-shortener

    spec:
      containers:
        - name: url-shortener
          image: elsa888/url-shortener:latest
          ports:
            - containerPort: 3000

          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: url-shortener-config
                  key: PORT

            - name: BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: url-shortener-config
                  key: BASE_URL

            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: url-shortener-config
                  key: MONGO_URI